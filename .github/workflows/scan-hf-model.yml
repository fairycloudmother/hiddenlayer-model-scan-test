name: Scan HuggingFace Model

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan_huggingface_model_sha:
    runs-on: ubuntu-latest
    name: flair/ner-english-ontonotes at SHA
    steps:
      - uses: actions/checkout@v3

      - name: Download Hugging Face model at SHA
        run: |
          python -m pip install --upgrade huggingface_hub
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download

          snapshot_download(
              repo_id="flair/ner-english-ontonotes",
              revision="ffa7600048695dade4afcb02d5ff48aee7a018ee",
              local_dir="hf-model",
              token=os.environ.get("HUGGINGFACE_TOKEN"),
          )
          PY
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Scan downloaded Hugging Face model
        id: scan_model_huggingface
        uses: hiddenlayerai/hiddenlayer-model-scan-github-action@v1.0.8
        with:
          model_path: ./hf-model
          model_name: flair/ner-english-ontonotes
          model_version: new
          fail_on_detection: false
          sarif_file: output.sarif
        env:
          HL_CLIENT_ID: ${{ secrets.HL_CLIENT_ID }}
          HL_CLIENT_SECRET: ${{ secrets.HL_CLIENT_SECRET }}

      - name: Check for SARIF output
        run: |
          echo "Current directory: $(pwd)"
          ls -al

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: output.sarif
